{{/* Glider map shortcode - interactive glider track map */}}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<div class="flex justify-center w-full">
  <div 
    id="gliderMap" 
    data-csv-url="{{ "data/glider_data_processed.csv" | relURL }}"
    class="rounded-xl shadow-lg border border-border z-0" 
    style="height: 600px; width: 100%; min-width: 100%;">
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<script>
  document.addEventListener("DOMContentLoaded", function() {

    function getBearing(lat1, lon1, lat2, lon2) {
      const lat1Rad = lat1 * Math.PI / 180;
      const lat2Rad = lat2 * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const y = Math.sin(dLon) * Math.cos(lat2Rad);
      const x = Math.cos(lat1Rad) * Math.sin(lat2Rad) -
                Math.sin(lat1Rad) * Math.cos(lat2Rad) * Math.cos(dLon);
      const bearing = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
      return bearing;
    }

    function haversineMetres(lat1, lng1, lat2, lng2) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLng / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    const map = L.map('gliderMap', {
        scrollWheelZoom: false,
        dragging: !L.Browser.mobile,   // ← ADD
        tap: false                      // ← ADD
    }).setView([-43.07, 173.48], 8);

    map.createPane('tickPane').style.zIndex = 450;
    map.createPane('arrowPane').style.zIndex = 440;

    // Scroll hint
    const container = map.getContainer();

    const hint = document.createElement('div');
    hint.textContent = 'Hold Ctrl / ⌘ Cmd to zoom';
    hint.className = 'map-glass-light';
    Object.assign(hint.style, {
        position:      'absolute',
        top:           '50%',
        left:          '50%',
        transform:     'translate(-50%, -50%)',
        pointerEvents: 'none',
        opacity:       '0',
        transition:    'opacity 0.2s',
        zIndex:        '1000',
    });
    container.style.position = 'relative';
    container.appendChild(hint);

    let hintTimeout;
    function showHint() {
        hint.style.opacity = '1';
        clearTimeout(hintTimeout);
        hintTimeout = setTimeout(() => { hint.style.opacity = '0'; }, 1500);
    }

    container.addEventListener('wheel', function(e) {
        if (e.ctrlKey || e.metaKey) {
            e.preventDefault();
            e.stopPropagation();
            const delta = e.deltaY < 0 ? 1 : -1;
            map.setZoom(map.getZoom() + delta);
        } else {
            showHint();
        }
    }, { passive: false });

    const touchHint = document.createElement('div');
    touchHint.textContent = 'Use two fingers to pan the map';
    touchHint.className = 'map-glass-light';
    Object.assign(touchHint.style, {
        position:      'absolute',
        top:           '50%',
        left:          '50%',
        transform:     'translate(-50%, -50%)',
        pointerEvents: 'none',
        opacity:       '0',
        transition:    'opacity 0.2s',
        zIndex:        '1000',
        whiteSpace:    'nowrap',
    });
    container.appendChild(touchHint);

    let touchHintTimeout;
    let touchHintDelay;
    function showTouchHint() {
        touchHint.style.opacity = '1';
        clearTimeout(touchHintTimeout);
        touchHintTimeout = setTimeout(() => { touchHint.style.opacity = '0'; }, 1500);
    }

    container.addEventListener('touchstart', function(e) {
        if (e.touches.length === 2) {
            map.dragging.enable();
            clearTimeout(touchHintDelay);
            touchHint.style.opacity = '0';
        } else {
            map.dragging.disable();
            touchHintDelay = setTimeout(() => showTouchHint(), 80);
        }
    }, { passive: true });

    container.addEventListener('touchend', function(e) {
        if (e.touches.length < 2) {
            map.dragging.disable();
        }
    }, { passive: true });

    L.control.scale({ imperial: false }).addTo(map);

    const lightTiles = 'https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}';
    const darkTiles  = 'https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}';

    const tileLayer = L.tileLayer(lightTiles, {
      minZoom: 0,
      maxZoom: 13,
      attribution: 'Tiles &copy; Esri &mdash; Sources: GEBCO, NOAA, CHS, OSU, UNH, CSUMB, National Geographic, DeLorme, NAVTEQ, and Esri'
    }).addTo(map);

    function updateTheme() {
      const isDark = document.documentElement.classList.contains('dark') || document.body.classList.contains('dark');
      tileLayer.setUrl(isDark ? darkTiles : lightTiles);
    }
    const observer = new MutationObserver(updateTheme);
    observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
    updateTheme();

    const gliderIcon = L.divIcon({
      className: 'custom-div-icon', 
      html: `
        <div class="glider-wrapper" style="color: #000000; transition: transform 0.5s ease-in-out; filter: drop-shadow(0px 1px 1px rgba(0,0,0,0.5));">
          <i data-lucide="plane" fill=#FFD22E style="width: 32px; height: 32px;"></i>
        </div>`,
      iconSize: [32, 32],
      iconAnchor: [16, 16]
    });

    let trackPath = L.polyline([], {
      color: '#002F73', 
      weight: 4,
      opacity: 0.75,
      dashArray: '8, 8', 
      lineJoin: 'round'
    }).addTo(map);

    let trackPathHitbox = L.polyline([], {
      weight: 20,
      opacity: 0,
      interactive: true
    }).addTo(map);

    // Plot config - keys match glider_plotting.py output
    const PLOT_BASE = '{{ "images/glider/" | relURL }}';
    const PLOTS = [
      { key: 'Temperature',                      label: 'Temperature' },
      { key: 'Salinity',                          label: 'Salinity' },
      { key: 'PAR',                               label: 'PAR' },
      { key: 'Coloured_Dissolved_Organic_Matter', label: 'CDOM' },
      { key: 'Chlorophyll-a',                     label: 'Chlorophyll' },
      { key: 'Optical_Backscatter',               label: 'Backscatter' },
    ];

    function getPopupWidth() {
      const mapWidth = map.getContainer().offsetWidth;
      return Math.min(520, Math.max(260, Math.round(mapWidth * 0.55)));
    }

    function buildPlotPopup(activeKey) {
      const popupWidth = getPopupWidth();
      const buttons = PLOTS.map(p => `
        <button
          class="btn-glass-sm ${p.key === activeKey ? 'active-btn-glass' : ''}"
          data-plot-key="${p.key}"
          style="margin: 3px 3px 3px 0;">
          ${p.label}
        </button>`
      ).join('');

      return `
        <div style="width: ${popupWidth}px; font-family: sans-serif;">
          <h4 style="margin: 0 0 8px 0; color: #333;">Track Plots</h4>
          <div style="margin-bottom: 8px; line-height: 1.8;">
            ${buttons}
          </div>
          <a id="glider-plot-link" href="${PLOT_BASE}${activeKey}.png" target="_blank" rel="noopener noreferrer">
            <img
              id="glider-plot-img"
              src="${PLOT_BASE}${activeKey}.png"
              alt="${activeKey}"
              style="width: 100%; border-radius: 6px; display: block; cursor: pointer;" />
          </a>
        </div>`;
    }

    const trackPopup = L.popup({
      maxWidth: getPopupWidth(),
      minWidth: getPopupWidth(),
      autoPan: true,
      autoPanPadding: [20, 20]
    });

    map.on('resize', function() {
      const w = getPopupWidth();
      trackPopup.options.maxWidth = w;
      trackPopup.options.minWidth = w;
    });

    trackPathHitbox.on('click', function(e) {
      trackPopup
        .setLatLng(e.latlng)
        .setContent(buildPlotPopup('Temperature'))
        .openOn(map);
    });

    map.on('popupopen', function(e) {
      if (e.popup !== trackPopup) return;

      const container = e.popup.getElement();
      container.addEventListener('click', function(evt) {
        const btn = evt.target.closest('[data-plot-key]');
        if (!btn) return;

        const key = btn.dataset.plotKey;

        container.querySelector('#glider-plot-img').src = `${PLOT_BASE}${key}.png`;
        container.querySelector('#glider-plot-link').href = `${PLOT_BASE}${key}.png`;

        container.querySelectorAll('[data-plot-key]').forEach(b => {
          b.classList.toggle('active-btn-glass', b.dataset.plotKey === key);
        });
      });
    });

    let arrowLayer = L.layerGroup().addTo(map);

    let gliderMarker = L.marker([0, 0], {icon: gliderIcon, bubblingMouseEvents: true})
      .addTo(map)
      .bindPopup('');

    let initialFitDone = false;
    
    async function updateGlider() {
      try {
        const csvUrl = document.getElementById('gliderMap').dataset.csvUrl;
        const response = await fetch(csvUrl);
        const text = await response.text();

        const rows = text.trim().split(/\r?\n/);

        // Parse CSV - skip header, cols: Day_Index, Timestamp, Longitude, Latitude
        const coordRows = rows
          .slice(1)
          .map(row => {
            const cols   = row.split(',');
            const dayIndex = parseInt(cols[0]);
            const unixSecs = parseFloat(cols[1]);
            const lng      = parseFloat(cols[2]);
            const lat      = parseFloat(cols[3]);
            return { dayIndex, unixSecs, lat, lng };
          })
          .filter(r => !isNaN(r.lat) && !isNaN(r.lng));

        if (coordRows.length === 0) {
          console.error("No valid coordinates found in CSV");
          return;
        }

        const history = coordRows.map(r => [r.lat, r.lng]);

        const lastRow  = coordRows[coordRows.length - 1];
        const lastDate = isNaN(lastRow.unixSecs)
          ? 'N/A'
          : new Date(lastRow.unixSecs * 1000).toLocaleString('en-NZ', {
              timeZone: 'Pacific/Auckland',
              day:      '2-digit',
              month:    'short',
              year:     'numeric',
              hour:     '2-digit',
              minute:   '2-digit',
            });

        const gliderPopupContent = `
          <div style="font-family: sans-serif; padding: 5px;">
            <h4 style="margin: 0 0 5px 0; color: #333;">Maui Ocean Glider</h4>
            <p style="margin: 2px 0;"><strong>Status:</strong> Active</p>
            <p style="margin: 2px 0;"><strong>Last Update:</strong> ${lastDate}</p>
          </div>
        `;

        gliderMarker.setPopupContent(gliderPopupContent);

        trackPath.setLatLngs(history);
        trackPathHitbox.setLatLngs(history);

        // Directional arrows
        const ARROW_SPACING_M = 10000;

        arrowLayer.clearLayers();
        let distAccum = ARROW_SPACING_M / 2;
        for (let i = 1; i < history.length - 1; i++) {
          const prev = history[i - 1];
          const curr = history[i];
          distAccum += haversineMetres(prev[0], prev[1], curr[0], curr[1]);

          if (distAccum >= ARROW_SPACING_M) {
            distAccum = 0;
            const bearing = getBearing(prev[0], prev[1], curr[0], curr[1]);

            const arrowIcon = L.divIcon({
              className: '',
              html: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16"
                       style="transform: rotate(${bearing}deg); display:block;">
                       <polygon points="8,1 15,15 8,11 1,15"
                         fill="#002F73" opacity="1" stroke="#B8D5FF" stroke-width="5" stroke-linejoin="round" paint-order="stroke fill"/>
                     </svg>`,
              iconSize:   [16, 16],
              iconAnchor: [8, 8],
            });

            L.marker(curr, { pane: 'arrowPane', icon: arrowIcon, interactive: false }).addTo(arrowLayer);
          }
        }

        // Rotate glider marker
        const newPos = history[history.length - 1];

        if (history.length >= 2) {
          const prevPoint = history[history.length - 2];
          const lastPoint = history[history.length - 1];

          const lat1 = prevPoint[0], lon1 = prevPoint[1];
          const lat2 = lastPoint[0], lon2 = lastPoint[1];

          const dLon = (lon2 - lon1) * Math.PI / 180;
          const y = Math.sin(dLon) * Math.cos(lat2 * Math.PI / 180);
          const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) -
                    Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos(dLon);

          let heading = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
          const finalRotation = heading + (-45);

          const iconElement = gliderMarker.getElement();
          if (iconElement) {
            const wrapper = iconElement.querySelector('.glider-wrapper');
            if (wrapper) wrapper.style.transform = `rotate(${finalRotation}deg)`;
          }
        }

        gliderMarker.setLatLng(newPos);

        if (!initialFitDone && trackPath.getBounds().isValid()) {
          map.fitBounds(trackPath.getBounds(), { padding: [40, 40] });
          initialFitDone = true;
        }

        lucide.createIcons();

      } catch (error) {
        console.error("Error loading CSV:", error);
      }
    }

    updateGlider();
    setInterval(updateGlider, 30000);
  });
</script>
