<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<div class="flex justify-center w-full">
  <div 
    id="gliderMap" 
    data-csv-url="{{ "glider_data_processed.csv" | relURL }}"
    class="rounded-xl shadow-lg border border-border z-0" 
    style="height: 600px; width: 100%; min-width: 100%;">
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<script>
  document.addEventListener("DOMContentLoaded", function() {

    function getBearing(lat1, lon1, lat2, lon2) {
      const lat1Rad = lat1 * Math.PI / 180;
      const lat2Rad = lat2 * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const y = Math.sin(dLon) * Math.cos(lat2Rad);
      const x = Math.cos(lat1Rad) * Math.sin(lat2Rad) -
                Math.sin(lat1Rad) * Math.cos(lat2Rad) * Math.cos(dLon);
      const bearing = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
      return bearing;
    }

    function haversineMetres(lat1, lng1, lat2, lng2) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLng / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    const map = L.map('gliderMap', {
        scrollWheelZoom: false
    }).setView([-43.07, 173.48], 8);

    map.createPane('tickPane').style.zIndex = 450;  // above tiles (200) and polylines (400), below markers (600)
    map.createPane('arrowPane').style.zIndex = 440;

    // --- Ctrl/Cmd scroll-to-zoom ---
    const container = map.getContainer();

    const hint = document.createElement('div');
    hint.textContent = 'Hold Ctrl / ⌘ Cmd to zoom';
    hint.className = 'map-glass-light';
    Object.assign(hint.style, {
        position:      'absolute',
        top:           '50%',
        left:          '50%',
        transform:     'translate(-50%, -50%)',
        pointerEvents: 'none',
        opacity:       '0',
        transition:    'opacity 0.2s',
        zIndex:        '1000',
    });
    container.style.position = 'relative';
    container.appendChild(hint);

    let hintTimeout;
    function showHint() {
        hint.style.opacity = '1';
        clearTimeout(hintTimeout);
        hintTimeout = setTimeout(() => { hint.style.opacity = '0'; }, 1500);
    }

    container.addEventListener('wheel', function(e) {
        if (e.ctrlKey || e.metaKey) {
            e.preventDefault();
            e.stopPropagation();
            const delta = e.deltaY < 0 ? 1 : -1;
            map.setZoom(map.getZoom() + delta);
        } else {
            showHint();
        }
    }, { passive: false });

    L.control.scale({ imperial: false }).addTo(map);

    const lightTiles = 'https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}';
    const darkTiles  = 'https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}';

    const tileLayer = L.tileLayer(lightTiles, {
      minZoom: 0,
      maxZoom: 13,
      attribution: 'Tiles &copy; Esri &mdash; Sources: GEBCO, NOAA, CHS, OSU, UNH, CSUMB, National Geographic, DeLorme, NAVTEQ, and Esri'
    }).addTo(map);

    function updateTheme() {
      const isDark = document.documentElement.classList.contains('dark') || document.body.classList.contains('dark');
      tileLayer.setUrl(isDark ? darkTiles : lightTiles);
    }
    const observer = new MutationObserver(updateTheme);
    observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
    updateTheme();

    const gliderIcon = L.divIcon({
      className: 'custom-div-icon', 
      html: `
        <div class="glider-wrapper" style="color: #000000; transition: transform 0.5s ease-in-out; filter: drop-shadow(0px 1px 1px rgba(0,0,0,0.5));">
          <i data-lucide="plane" fill=#FFD22E style="width: 32px; height: 32px;"></i>
        </div>`,
      iconSize: [32, 32],
      iconAnchor: [16, 16]
    });

    let trackPath = L.polyline([], {
      color: '#002F73', 
      weight: 4,
      opacity: 0.75,
      dashArray: '8, 8', 
      lineJoin: 'round'
    }).addTo(map);

    // ── Layer group for day-boundary tick marks ───────────────────────────────
    let divePointsLayer = L.layerGroup().addTo(map);

    // ── Layer group for directional arrow markers ─────────────────────────────
    let arrowLayer = L.layerGroup().addTo(map);

    const popupContent = `
      <div style="font-family: sans-serif; padding: 5px;">
        <h3 style="margin: 0 0 5px 0; color: #333;">Glider</h3>
        <p style="margin: 2px 0;"><strong>Status:</strong> Unactive</p>
        <p style="margin: 2px 0;"><strong>Battery:</strong> 100%</p>
        <p style="margin: 2px 0;"><strong>Last Update:</strong> N/A</p>
      </div>
    `;

    let gliderMarker = L.marker([0, 0], {icon: gliderIcon, bubblingMouseEvents: true})
      .addTo(map)
      .bindPopup(popupContent); 

    async function updateGlider() {
      try {
        const csvUrl = document.getElementById('gliderMap').dataset.csvUrl;
        const response = await fetch(csvUrl);
        const text = await response.text();

        const rows = text.trim().split(/\r?\n/);

        // Parse all rows that have coordinates (col 0=Day_Index, 2=Lon, 3=Lat)
        const coordRows = rows
          .slice(2)
          .map(row => {
            const cols = row.split(',');
            const dayIndex = parseInt(cols[0]);
            const lng = parseFloat(cols[2]);
            const lat = parseFloat(cols[3]);
            return { dayIndex, lat, lng };
          })
          .filter(r => !isNaN(r.lat) && !isNaN(r.lng));

        if (coordRows.length === 0) {
          console.error("No valid coordinates found in CSV");
          return;
        }

        const history = coordRows.map(r => [r.lat, r.lng]);

        // ── Draw polyline ─────────────────────────────────────────────────────
        trackPath.setLatLngs(history);

        // ── Directional arrows spaced by real-world distance ──────────────────
        // Accumulates haversine metres so arrows are evenly spread geographically,
        // regardless of how clustered the GPS surfacing fixes are.
        const ARROW_SPACING_M = 7500; // metres between arrows — adjust to taste

        arrowLayer.clearLayers();
        let distAccum = ARROW_SPACING_M / 2; // offset so first arrow isn't right at the start
        for (let i = 1; i < history.length - 1; i++) {
          const prev = history[i - 1];
          const curr = history[i];
          distAccum += haversineMetres(prev[0], prev[1], curr[0], curr[1]);

          if (distAccum >= ARROW_SPACING_M) {
            distAccum = 0;
            const bearing = getBearing(prev[0], prev[1], curr[0], curr[1]);

            const arrowIcon = L.divIcon({
              className: '',
              html: `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 16 16"
                       style="transform: rotate(${bearing}deg); display:block;">
                       <polygon points="8,1 15,15 8,11 1,15"
                         fill="#002F73" opacity="0.9"/>
                     </svg>`,
              iconSize:   [16, 16],
              iconAnchor: [7, 7],
            });

            L.marker(curr, { pane: 'arrowPane', icon: arrowIcon, interactive: false }).addTo(arrowLayer);
          }
        }

        // ── Find GPS points where Day_Index increases ─────────────────────────
        const dayBoundaryPoints = [];
        for (let i = 1; i < coordRows.length; i++) {
          if (coordRows[i].dayIndex > coordRows[i - 1].dayIndex) {
            dayBoundaryPoints.push({ pos: [coordRows[i].lat, coordRows[i].lng], histIdx: i });
          }
        }

        // ── Draw a perpendicular tick at each day boundary ────────────────────
        function offsetPoint(lat, lng, bearingDeg, metres) {
          const R = 6371000;
          const d = metres / R;
          const brng = bearingDeg * Math.PI / 180;
          const lat1 = lat * Math.PI / 180;
          const lon1 = lng * Math.PI / 180;
          const lat2 = Math.asin(
            Math.sin(lat1) * Math.cos(d) +
            Math.cos(lat1) * Math.sin(d) * Math.cos(brng)
          );
          const lon2 = lon1 + Math.atan2(
            Math.sin(brng) * Math.sin(d) * Math.cos(lat1),
            Math.cos(d) - Math.sin(lat1) * Math.sin(lat2)
          );
          return [lat2 * 180 / Math.PI, lon2 * 180 / Math.PI];
        }

        const TICK_HALF_LENGTH = 800; // metres each side of the track

        divePointsLayer.clearLayers();
        dayBoundaryPoints.forEach(({ pos: [lat, lng], histIdx }) => {
          const prev = history[histIdx - 1] || history[histIdx];
          const next = history[histIdx + 1] || history[histIdx];

          const trackBearing = getBearing(prev[0], prev[1], next[0], next[1]);
          const perpBearing  = (trackBearing + 90) % 360;

          const p1 = offsetPoint(lat, lng, perpBearing,       TICK_HALF_LENGTH);
          const p2 = offsetPoint(lat, lng, perpBearing + 180, TICK_HALF_LENGTH);

          L.polyline([p1, p2], {
            pane: 'tickPane',
            color:   '#ffffff',
            weight: 4,
            opacity: 0.9,
          }).addTo(divePointsLayer);
        });

        // ── Rotate & reposition glider marker ────────────────────────────────
        const newPos = history[history.length - 1];

        if (history.length >= 2) {
          const prevPoint = history[history.length - 2];
          const lastPoint = history[history.length - 1];

          const lat1 = prevPoint[0], lon1 = prevPoint[1];
          const lat2 = lastPoint[0], lon2 = lastPoint[1];

          const dLon = (lon2 - lon1) * Math.PI / 180;
          const y = Math.sin(dLon) * Math.cos(lat2 * Math.PI / 180);
          const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) -
                    Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos(dLon);

          let heading = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
          const finalRotation = heading + (-45);

          const iconElement = gliderMarker.getElement();
          if (iconElement) {
            const wrapper = iconElement.querySelector('.glider-wrapper');
            if (wrapper) wrapper.style.transform = `rotate(${finalRotation}deg)`;
          }
        }

        gliderMarker.setLatLng(newPos);

        if (trackPath.getBounds().isValid()) {
          map.fitBounds(trackPath.getBounds(), { padding: [40, 40] });
        }

        lucide.createIcons();

      } catch (error) {
        console.error("Error loading CSV:", error);
      }
    }

    updateGlider();
    setInterval(updateGlider, 30000);
  });
</script>
